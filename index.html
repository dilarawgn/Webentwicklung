<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickMySheet</title>
    <link rel="stylesheet" href="name.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <aside class="controls">
            <h2>Lose hinzufügen</h2>
            <input type="text" id="wordInput" placeholder="Wort eingeben...">
            <ul><button class="btn add-btn" id="addButton">Hinzufügen</button></ul>

            <div class="input-preview">
                <h3>Lose im Korb: </h3>
                <ul id="meinText"></ul>
            </div>
            <button class="btn start-btn">Ziehung starten!</button>
        </aside>

            <main class="drawing-area">
                <div class="basket">
                    <div class="basket-handle"></div>
                     <div class="basket-body">
                        <span class="basket-label">Loskorb</span>
                     </div>
                </div>
             </main>

            <aside class="history">
                 <h2>Gezogene Lose</h2>
                 <ul id="logList">
                    <li>Los 1</li>
                     <li>Los 2</li>
                     <li>Los X</li>
                 </ul>
            
            <div class="save-overview">
                <small>Neue Liste hinzufügen:</small>
                <input type="text" id="saveListName" placeholder="Name eingeben...">
                <button class="btn save-btn">Speichern</button>
            </div>

            <div class="saved-lists-header">Gespeicherte Listen:</div>
            <div id="savedListsContainer" class="saved-lists-area">
                <ul id="actualSavedLists">
                    <li>
                        <span>Liste_01</span>
                        <div class="list-item-btns">
                            <button class="mini-load-btn">Laden</button>
                            <button class="mini-delete-btn">×</button>
                        </div>
                    </li>
                    </ul>
            </div>
        </aside>
    </div>
</body>
</html>
